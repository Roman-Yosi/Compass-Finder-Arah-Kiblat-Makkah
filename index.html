<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compass Kiblat Makkah</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    color:white;
    text-align:center;
}

header{
    padding:20px;
    background:#111827;
}

h1{
    margin:0;
    color:#fbbf24;
    font-size:20px;
}

.compass-wrapper{
    margin-top:30px;
    display:flex;
    justify-content:center;
}

.compass{
    width:320px;
    height:320px;
    border-radius:50%;
    border:8px solid #fbbf24;
    position:relative;
    background:radial-gradient(circle,#1e293b,#0b1220);
    transition:transform 0.1s linear;
}

/* NAMA ARAH */
.north{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-weight:bold;
    color:#60a5fa;
}
.south{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    font-weight:bold;
}
.east{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    font-weight:bold;
}
.west{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    font-weight:bold;
}

/* KA'BAH CENTER */
.kaaba{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:50px;
    z-index:3;
}

/* PANAH KIBLAT */
.qibla-arrow{
    position:absolute;
    top:50%;
    left:50%;
    width:0;
    height:0;
    transform-origin:center;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-bottom:130px solid #22c55e;
    filter:drop-shadow(0 0 8px #22c55e);
    z-index:2;
}

/* titik tengah */
.center-dot{
    width:12px;
    height:12px;
    background:#fbbf24;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:4;
}

button{
    margin-top:20px;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#fbbf24;
    font-weight:bold;
    cursor:pointer;
}

.info{
    margin-top:15px;
    font-size:15px;
}
</style>
</head>

<body>

<header>
<h1>🕋 Compass Kiblat Makkah</h1>
<p>Penunjuk arah kiblat otomatis</p>
</header>

<div class="compass-wrapper">

<div id="compass" class="compass">

    <div class="north">N</div>
    <div class="east">E</div>
    <div class="south">S</div>
    <div class="west">W</div>

    <div class="qibla-arrow" id="qiblaArrow"></div>
    <div class="kaaba">🕋</div>
    <div class="center-dot"></div>

</div>

</div>

<button onclick="startCompass()">Aktifkan Kompas</button>

<div class="info">
<p id="loc">Lokasi: -</p>
<p id="qibla">Kiblat: -</p>
</div>

<script>
const KAABA_LAT = 21.4225;
const KAABA_LON = 39.8262;

let qiblaDirection = 0;

/* HITUNG ARAH KIBLAT */
function calculateQibla(lat, lon){
    const φK = KAABA_LAT * Math.PI/180;
    const λK = KAABA_LON * Math.PI/180;
    const φ = lat * Math.PI/180;
    const λ = lon * Math.PI/180;

    const y = Math.sin(λK - λ);
    const x = Math.cos(φ)*Math.tan(φK) -
              Math.sin(φ)*Math.cos(λK - λ);

    let brng = Math.atan2(y, x) * 180/Math.PI;
    return (brng + 360) % 360;
}

/* GPS */
navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    document.getElementById("loc").innerText =
    `Lokasi: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;

    qiblaDirection = calculateQibla(lat, lon);

    document.getElementById("qibla").innerText =
    `Kiblat: ${qiblaDirection.toFixed(1)}°`;
});

/* SENSOR KOMPAZ */
function startCompass(){
window.addEventListener("deviceorientation", (event)=>{

let heading;

if(event.webkitCompassHeading){
    heading = event.webkitCompassHeading;
}else{
    heading = 360 - event.alpha;
}

/* ROTASI KOMPAS */
document.getElementById("compass").style.transform =
`rotate(${-heading}deg)`;

/* ROTASI PANAH KIBLAT */
const arrow = qiblaDirection - heading;

document.getElementById("qiblaArrow").style.transform =
`translate(-50%,-50%) rotate(${arrow}deg)`;

});
}
</script>

</body>
</html>
